<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1f33">
  <title>PA46 Power Settings</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PA46 Power">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="aircraft-picker">
      <span class="brand">PA46</span>
      <select id="aircraftSelect" aria-label="Active aircraft"></select>
      <button id="manageBtn" class="icon-btn" aria-label="Manage aircraft" title="Manage aircraft">&#9881;</button>
    </div>
  </header>

  <main class="app-main">
    <!-- Inputs -->
    <section class="card inputs">
      <div class="field">
        <label for="baro">Altimeter setting <span class="unit">(in Hg)</span></label>
        <input id="baro" type="number" inputmode="decimal" step="0.01" min="27" max="32" value="29.92">
        <p class="hint" id="baroHint">&nbsp;</p>
      </div>

      <div class="field">
        <label for="indAlt">Assigned altitude <span class="unit">(ft)</span></label>
        <div class="stepper">
          <button type="button" class="step-btn" id="altDown" aria-label="Decrease altitude">&minus;</button>
          <input id="indAlt" type="number" inputmode="numeric" step="500" min="0" max="30000" value="18000">
          <button type="button" class="step-btn" id="altUp" aria-label="Increase altitude">+</button>
        </div>
        <p class="hint" id="paHint">&nbsp;</p>
      </div>

      <div class="field">
        <label for="oat">OAT <span class="unit">(&deg;C)</span></label>
        <input id="oat" type="number" inputmode="numeric" step="1" min="-60" max="50" value="-5">
        <p class="hint" id="oatHint">&nbsp;</p>
      </div>

      <div class="field">
        <label>Desired performance</label>
        <div class="power-buttons" id="powerButtons" role="group" aria-label="Power setting"></div>
      </div>
    </section>

    <!-- Results -->
    <section class="card results" id="results">
      <div class="result-grid">
        <div class="result">
          <span class="result-label">RPM</span>
          <span class="result-value" id="rRPM">—</span>
        </div>
        <div class="result">
          <span class="result-label">Manifold pressure</span>
          <span class="result-value" id="rMAP">—<span class="result-unit"> in Hg</span></span>
        </div>
        <div class="result">
          <span class="result-label">Fuel flow</span>
          <span class="result-value" id="rFF">—<span class="result-unit"> GPH</span></span>
        </div>
        <div class="result highlight">
          <span class="result-label">Expected airspeed</span>
          <span class="result-value" id="rTAS">—<span class="result-unit"> KTAS</span></span>
        </div>
      </div>

      <div class="warnings" id="warnings"></div>
    </section>

    <p class="disclaimer">For reference only &mdash; not for flight. Verify against the POH.</p>
  </main>

  <!-- Manage-aircraft dialog -->
  <dialog id="manageDialog" class="dialog">
    <div class="dialog-body">
      <div class="dialog-head">
        <h2>Aircraft</h2>
        <button type="button" id="closeDialogBtn" class="icon-btn" aria-label="Close">&times;</button>
      </div>

      <div id="aircraftList" class="aircraft-list"></div>
      <button type="button" id="addAircraftBtn" class="btn add-btn">+ Add aircraft</button>

      <!-- Editor: shown only when adding or editing -->
      <div id="editor" class="editor" hidden>
        <hr>
        <h3 id="editorTitle">Add aircraft</h3>
        <input type="hidden" id="editId">

        <div class="field">
          <label for="editType">Aircraft type</label>
          <select id="editType"></select>
        </div>

        <div class="field">
          <label for="editName">Name / tail number</label>
          <input id="editName" type="text" placeholder="e.g. N123AB — Malibu" maxlength="40">
        </div>

        <div class="field">
          <label>Airframe airspeed bias</label>
          <div class="seg" id="biasMode" role="group" aria-label="Bias entry mode">
            <button type="button" class="seg-btn active" data-mode="pct">Percent</button>
            <button type="button" class="seg-btn" data-mode="kt">Knots @ alt</button>
          </div>

          <div id="biasPctRow" class="bias-row">
            <input id="editBiasPct" type="number" inputmode="decimal" step="0.1" min="-20" max="20" value="0">
            <span class="unit">%</span>
          </div>

          <div id="biasKtRow" class="bias-row" hidden>
            <input id="editBiasKt" type="number" inputmode="numeric" step="1" min="-40" max="40" placeholder="±kt">
            <span class="unit">kt at</span>
            <input id="editBiasAlt" type="number" inputmode="numeric" step="1000" min="0" max="25000" value="18000">
            <span class="unit">ft</span>
          </div>

          <p class="hint" id="biasHelp">+ if your airframe runs faster than book, − if slower. Applied as a uniform % at all altitudes.</p>
        </div>

        <label class="check-row">
          <input type="checkbox" id="editDefault"> Open this aircraft by default
        </label>

        <div class="dialog-actions">
          <button type="button" id="saveAircraftBtn" class="btn primary">Save</button>
          <button type="button" id="cancelEditBtn" class="btn ghost">Cancel</button>
        </div>
      </div>
    </div>
  </dialog>

  <script src="data.js"></script>
  <script src="calc.js"></script>
  <script src="app.js"></script>
</body>
</html>
